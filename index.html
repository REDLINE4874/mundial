<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinámica Mundialista 2026</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:#0b3d0b;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(0,0,0,.3);
}

.header{
    background:linear-gradient(90deg,#001d4a,#003b9a);
    color:white;
    text-align:center;
    padding:25px;
}

.header h1{
    font-size:42px;
    color:#f5c542;
}

.header h2{
    font-size:18px;
    margin-top:10px;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#0a1f44;
    color:white;
}

th{
    padding:15px;
    font-size:18px;
}

td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f5f5f5;
}

.posicion{
    font-weight:bold;
    color:white;
    background:#28a745;
    border-radius:5px;
    padding:5px 10px;
}

.acciones button{
    margin:2px;
    border:none;
    padding:6px 10px;
    border-radius:5px;
    cursor:pointer;
    color:white;
    font-weight:bold;
}

.ganar{
    background:#28a745;
}

.empate{
    background:#ffc107;
    color:black;
}

.restar{
    background:#dc3545;
}

.footer{
    background:#0b6b0b;
    color:white;
    text-align:center;
    padding:15px;
    font-weight:bold;
}

.reset{
    text-align:center;
    padding:15px;
}

.reset button{
    background:#dc3545;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
}

@media(max-width:700px){

    th,td{
        font-size:12px;
        padding:8px;
    }

    .header h1{
        font-size:28px;
    }

}
</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>🏆 DINÁMICA MUNDIALISTA</h1>
<h2>¡QUE GANE EL MEJOR!</h2>
</div>

<table>

<thead>
<tr>
<th>#</th>
<th>País</th>
<th>Participante</th>
<th>Puntos</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

<div class="reset">
<button onclick="reiniciar()">Reiniciar Puntos</button>
</div>

<div class="footer">
⚽ PASIÓN, EQUIPO Y DIVERSIÓN ⚽
</div>

</div>

<script>

let equipos = JSON.parse(localStorage.getItem("equipos")) || [

{
pais:"🇫🇷 Francia",
participante:"Araceli",
puntos:0
},
{
pais:"🇪🇸 España",
participante:"Danyel",
puntos:0
},
{
pais:"🇨🇴 Colombia",
participante:"Brianda",
puntos:0
},
{
pais:"🇲🇽 México",
participante:"Ariana",
puntos:0
},
{
pais:"🇩🇪 Alemania",
participante:"Karen",
puntos:0
},
{
pais:"🏴 Inglaterra",
participante:"Oscar",
puntos:0
},
{
pais:"🇧🇷 Brasil",
participante:"Gabriel",
puntos:0
},
{
pais:"🇵🇹 Portugal",
participante:"Salvador",
puntos:0
},
{
pais:"🇺🇸 Estados Unidos",
participante:"Luis",
puntos:0
},
{
pais:"🇦🇷 Argentina",
participante:"Juan",
puntos:0
}

];

function guardar(){
    localStorage.setItem("equipos",JSON.stringify(equipos));
}

function render(){

    equipos.sort((a,b)=>b.puntos-a.puntos);

    let html="";

    equipos.forEach((equipo,index)=>{

        let medalla="";

        if(index===0) medalla="🥇";
        else if(index===1) medalla="🥈";
        else if(index===2) medalla="🥉";

        html+=`
        <tr>
            <td>
                <span class="posicion">
                    ${index+1}
                </span>
                ${medalla}
            </td>

            <td>${equipo.pais}</td>

            <td>${equipo.participante}</td>

            <td><b>${equipo.puntos}</b></td>

            <td class="acciones">

                <button class="ganar"
                onclick="sumar('${equipo.participante}',3)">
                +3
                </button>

                <button class="empate"
                onclick="sumar('${equipo.participante}',1)">
                +1
                </button>

                <button class="restar"
                onclick="sumar('${equipo.participante}',-1)">
                -1
                </button>

            </td>
        </tr>
        `;
    });

    document.getElementById("tabla").innerHTML=html;

    guardar();
}

function sumar(nombre,puntos){

    let equipo=equipos.find(
        e=>e.participante===nombre
    );

    equipo.puntos+=puntos;

    if(equipo.puntos<0)
        equipo.puntos=0;

    render();
}

function reiniciar(){

    if(confirm("¿Reiniciar todos los puntos?")){

        equipos.forEach(e=>{
            e.puntos=0;
        });

        render();
    }
}

render();

</script>

</body>
</html>
